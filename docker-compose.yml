version: '3.8'

services:
  # Development service
  dev:
    build:
      context: ./frontend/landing
      dockerfile: Dockerfile.dev
    container_name: coreasia-dev
    volumes:
      - ./frontend/landing:/app
      - /app/node_modules
      - /app/.nuxt
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - NUXT_PUBLIC_SITE_URL=http://localhost:3001
    command: bun run dev
    stdin_open: true
    tty: true

  # Production build
  prod:
    build:
      context: ./frontend/landing
      dockerfile: Dockerfile.prod
    container_name: coreasia-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_SITE_URL=https://coreasia.id
    restart: unless-stopped

volumes:
  node_modules:
