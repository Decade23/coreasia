<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" /> <!-- Sangat terang -->
      <stop offset="50%" stop-color="#EAB308" /> <!-- Emas utama -->
      <stop offset="100%" stop-color="#A16207" /> <!-- Emas gelap -->
    </linearGradient>
  </defs>

  <!-- Ikon Minimalis Abstrak (Hexagon Core & Sinyal) -->
  <g transform="translate(30, 20)">
    <!-- Hexagon Luar -->
    <path d="M40 0 L80 23 L80 69 L40 92 L0 69 L0 23 Z" fill="none" stroke="url(#goldGradient)" stroke-width="5" stroke-linejoin="round"/>
    <!-- Inti (Core) -->
    <path d="M40 20 L58 31 L58 53 L40 64 L22 53 L22 31 Z" fill="url(#goldGradient)" />
    <!-- Titik Pusat -->
    <circle cx="40" cy="42" r="6" fill="#ffffff" />
  </g>

  <!-- Tipografi Premium -->
  <text x="140" y="78" font-family="'Inter', 'Montserrat', 'Segoe UI', sans-serif" font-size="56" font-weight="800" fill="#0F172A" letter-spacing="2">CORE</text>
  <text x="315" y="78" font-family="'Inter', 'Montserrat', 'Segoe UI', sans-serif" font-size="56" font-weight="300" fill="url(#goldGradient)" letter-spacing="8">ASIA</text>
</svg>