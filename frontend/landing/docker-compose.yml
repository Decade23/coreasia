services:
  landing-dev:
    container_name: coreasia_landing_dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        BUN_VERSION: ${BUN_VERSION:-1.3.9}
    ports:
      - "${DEV_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
    command: bun run dev --host 0.0.0.0 --port 3000
    develop:
      watch:
        - action: sync
          path: ./app.vue
          target: /app/app.vue
        - action: sync
          path: ./assets
          target: /app/assets
        - action: sync
          path: ./components
          target: /app/components
        - action: sync
          path: ./layouts
          target: /app/layouts
        - action: sync
          path: ./pages
          target: /app/pages
        - action: sync
          path: ./public
          target: /app/public
        - action: sync+restart
          path: ./nuxt.config.ts
          target: /app/nuxt.config.ts
        - action: sync+restart
          path: ./tailwind.config.ts
          target: /app/tailwind.config.ts
        - action: sync+restart
          path: ./tsconfig.json
          target: /app/tsconfig.json
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./bun.lock
        - action: rebuild
          path: ./Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: coreasia_nginx_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - landing-dev
    restart: unless-stopped
