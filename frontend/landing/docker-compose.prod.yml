services:
  landing-prod:
    container_name: coreasia_landing_prod
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        BUN_VERSION: ${BUN_VERSION:-1.3.9}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
