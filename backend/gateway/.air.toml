[build]
  cmd = "GOMAXPROCS=1 GOGC=10 GOMEMLIMIT=512MiB go build -p=1 -o ./tmp/main ./cmd/server"
  bin = "./tmp/main -config configs/config.yaml"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "pkg"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  include_dir = []
  include_ext = ["go", "yaml"]
  kill_delay = "2s"
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
